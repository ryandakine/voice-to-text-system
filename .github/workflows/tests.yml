name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      # System deps that the Python test harness touches via mocks (pyaudio import)
      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y portaudio19-dev python3-dev xdotool xclip

      - name: Install minimal Python test deps
        run: |
          python -m pip install --upgrade pip
          # Tests mock the heavy deps (faster-whisper, silero-vad, pyaudio, pynput).
          # We only need the light ones to actually run.
          pip install pytest numpy

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short
